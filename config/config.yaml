dataset_id: FD001 # Change to FD002/FD003/FD004 for multi-dataset runs

dataset:
  name: FD001
  raw_path: data/raw/
  processed_path: data/processed/
  train_file: train_FD001.txt
  test_file: test_FD001.txt
  rul_file: RUL_FD001.txt

  columns:
    - unit
    - cycle
    - op_setting_1
    - op_setting_2
    - op_setting_3
    - sensor_1
    - sensor_2
    - sensor_3
    - sensor_4
    - sensor_5
    - sensor_6
    - sensor_7
    - sensor_8
    - sensor_9
    - sensor_10
    - sensor_11
    - sensor_12
    - sensor_13
    - sensor_14
    - sensor_15
    - sensor_16
    - sensor_17
    - sensor_18
    - sensor_19
    - sensor_20
    - sensor_21

selected_sensors:
  - sensor_2
  - sensor_3
  - sensor_4
  - sensor_7
  - sensor_8
  - sensor_9
  - sensor_11
  - sensor_12
  - sensor_13
  - sensor_14
  - sensor_15
  - sensor_17
  - sensor_20
  - sensor_21

save_scaler: true
scaler_path: models/scaler.joblib

health_index:
  axes:
    hpc:
      sensors:
        - sensor_3
        - sensor_4
        - sensor_7
        - sensor_8
        - sensor_11
        - sensor_13
        - sensor_14
        - sensor_17
        - sensor_20
        - sensor_21
    fan:
      sensors:
        - sensor_2
        - sensor_9
        - sensor_12
        - sensor_15
  variance_gate:
    enabled: true
    mode: warn
    by_dataset:
      FD001: 0.60
      FD002: 0.40
      FD003: 0.40
      FD004: 0.40

fault_classifier:
  late_life_window: 30
  min_cluster_size: 10
  silhouette_gate:
    enabled: true
    mode: warn # warn | block - never block during development
    min_silhouette: 0.25
  hpc_sensors:
    - sensor_3
    - sensor_4
    - sensor_7
    - sensor_8
    - sensor_11
    - sensor_13
    - sensor_14
    - sensor_17
    - sensor_20
    - sensor_21
  fan_sensors:
    - sensor_2
    - sensor_9
    - sensor_12
    - sensor_15

rolling:
  window_size: 20
  min_periods: 2

features:
  velocity:
    window: 20

clustering:
  n_clusters: 3
  random_state: 42
  n_init: 10

regimes:
  enabled: true
  n_regimes: 1
  silhouette_min_threshold: 0.30
  enforce_silhouette_gate: true
  setting_cols:
    - op_setting_1
    - op_setting_2
    - op_setting_3
  random_state: 42
  by_dataset:
    FD001: 1
    FD002: 6
    FD003: 1
    FD004: 6

risk_score:
  normalize: true
  distance_metric: euclidean

validation:
  monotonicity_abs_rho_threshold: 0.7
  weak_risk_rul_correlation_threshold: -0.5
  anomaly_chi_square_p_value: 0.99
  enforce_anomaly_gate: true

rul:
  max_rul_clip: 125
  piecewise_onset_threshold: 0.05
  random_state: 42
  save_path: models/
  safety_gates:
    late_early_ratio_limit: 1.5
    late_early_gate_mode: warn
  models:
    random_forest_n_estimators: 100
    gradient_boosting_n_estimators: 100
  features:
    - health_index
    - HI_velocity
    - HI_variability
    - risk_score

dashboard:
  rul_bands:
    healthy_min: 80
    degrading_min: 30

aog_simulator:
  # Monetary benchmarks — all in Indian Rupees
  # Source: Go First NCLT filing 2023 ($55k/day = Rs 45.65L/day narrowbody)
  aog_cost_per_event_rs_cr: 4.55
  revenue_per_day_rs_lakh: 45.0
  preventive_maintenance_cost_rs_cr: 1.20
  expected_aog_duration_days: 3

  # Passenger disruption (DGCA compensation basis)
  disruption_cost_per_passenger_rs: 4500
  passengers_per_flight: 180
  flights_per_day: 6

  # Sigmoid calibration — midpoint = Degrading centroid (0.66)
  sigmoid_midpoint: 0.66
  sigmoid_steepness: 10.0

  # BTS Form 41 P-5.2 derived (fallback via IATA MCX FY2024)
  bts_narrowbody_engine_cost_usd_per_block_hour: 180.0
  bts_widebody_engine_cost_usd_per_block_hour: 420.0
