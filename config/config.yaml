dataset:
  name: FD001
  raw_path: data/raw/
  processed_path: data/processed/
  train_file: train_FD001.txt
  test_file: test_FD001.txt
  rul_file: RUL_FD001.txt

  columns:
    - unit
    - cycle
    - op_setting_1
    - op_setting_2
    - op_setting_3
    - sensor_1
    - sensor_2
    - sensor_3
    - sensor_4
    - sensor_5
    - sensor_6
    - sensor_7
    - sensor_8
    - sensor_9
    - sensor_10
    - sensor_11
    - sensor_12
    - sensor_13
    - sensor_14
    - sensor_15
    - sensor_16
    - sensor_17
    - sensor_18
    - sensor_19
    - sensor_20
    - sensor_21

selected_sensors:
  - sensor_2
  - sensor_3
  - sensor_4
  - sensor_7
  - sensor_8
  - sensor_9
  - sensor_11
  - sensor_12
  - sensor_13
  - sensor_14
  - sensor_15
  - sensor_17
  - sensor_20
  - sensor_21

save_scaler: true
scaler_path: models/scaler.joblib

health_index:
  n_components: 1
  normalize: true
  invert: true

rolling:
  window_size: 20
  min_periods: 2

clustering:
  n_clusters: 3
  random_state: 42
  n_init: 10

risk_score:
  normalize: true
  distance_metric: euclidean

validation:
  monotonicity_abs_rho_threshold: 0.7
  weak_risk_rul_correlation_threshold: -0.5

rul:
  max_rul_clip: 125
  piecewise_onset_threshold: 0.05
  random_state: 42
  save_path: models/
  features:
    - health_index
    - HI_velocity
    - HI_variability
    - risk_score

ecommerce_wallboard:
  data_path: data/raw/ecommerce.csv
  monthly_period: M
  sparkline_months: 12
  discount_is_fraction: true
  metrics:
    sales_decimals: 0
    percentage_decimals: 2
    currency_symbol: "$"
  columns:
    order_date: Order Date
    sales: Sales
    profit: Profit
    discount: Discount
    order_id: Order ID
  column_candidates:
    order_date:
      - Order Date
      - InvoiceDate
      - order_date
      - invoice_date
      - date
    sales:
      - Sales
      - Revenue
      - sales
      - revenue
    profit:
      - Profit
      - profit
    discount:
      - Discount
      - discount
    order_id:
      - Order ID
      - InvoiceNo
      - Invoice
      - order_id
      - invoice_no
