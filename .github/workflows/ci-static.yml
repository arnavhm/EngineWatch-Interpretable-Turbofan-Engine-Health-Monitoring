name: CI Static Checks

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/ci-static.yml"
  pull_request:
    paths:
      - "**.py"
      - "requirements.txt"
      - ".github/workflows/ci-static.yml"

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run static checks
        run: python scripts/ci_static_checks.py
